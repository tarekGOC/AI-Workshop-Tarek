version: '3.8'

services:
  react-skeleton:
    build: .
    container_name: react-skeleton
    ports:
      - "5173:5173"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./index.html:/app/index.html
      - ./vite.config.ts:/app/vite.config.ts
    command: npm run dev -- --host 0.0.0.0
    restart: unless-stopped
